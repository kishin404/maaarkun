<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mar君😎 - レポート作成ツール</title>
    <link rel="icon" href="IMG_8917.ico" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDysubyBTK7o2JvoOY-PAB8JlAY8-QZfD4",
            authDomain: "mar-kun-app.firebaseapp.com",
            projectId: "mar-kun-app",
            storageBucket: "mar-kun-app.firebasestorage.app",
            messagingSenderId: "392787998936",
            appId: "1:392787998936:web:a0c01b3b7089e1388d3fad"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let isSyncing = false;

        window.login = () => {
            signInWithPopup(auth, provider).catch(err => {
                if(err.code === 'auth/requests-from-referer-blocked') {
                    alert("エラー: Google Cloudの設定で 'kishin404.github.io/*' を許可してください。");
                } else {
                    alert("ログイン失敗: " + err.message);
                }
            });
        };

        window.logout = () => {
            if (confirm("ログアウトしますか？")) {
                signOut(auth).then(() => {
                    localStorage.removeItem('marKunData');
                    location.reload();
                });
            }
        };

        onAuthStateChanged(auth, async (user) => {
            const loginBtn = document.getElementById('loginBtn');
            const userArea = document.getElementById('userArea');
            const syncStatus = document.getElementById('syncStatus');

            if (user) {
                currentUser = user;
                loginBtn.style.display = 'none';
                userArea.style.display = 'inline-flex';
                document.getElementById('userName').textContent = user.displayName + " さん";
                syncStatus.textContent = "⏳ クラウド同期中...";
                await loadFromFirestore(user.uid);
                syncStatus.textContent = "✅ クラウド同期済み";
            } else {
                currentUser = null;
                loginBtn.style.display = 'inline-block';
                userArea.style.display = 'none';
                syncStatus.textContent = "🌐 ローカルモード";
                loadFromLocal();
            }
        });

        window.triggerCloudSave = async (data) => {
            if (!currentUser || isSyncing) return;
            const syncStatus = document.getElementById('syncStatus');
            isSyncing = true;
            try {
                await setDoc(doc(db, "users", currentUser.uid), {
                    reportData: JSON.stringify(data),
                    updatedAt: new Date()
                });
                syncStatus.textContent = "✅ クラウド保存完了";
            } catch (e) {
                syncStatus.textContent = "❌ クラウド保存失敗";
            } finally {
                isSyncing = false;
            }
        };

        async function loadFromFirestore(uid) {
            const docRef = doc(db, "users", uid);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                window.applyDataToUI(JSON.parse(docSnap.data().reportData));
            } else {
                loadFromLocal();
            }
        }
    </script>

    <style>
        :root {
            --mustard: #e1ad01; --blue-green: #009688; --dull-red: #b85450;
            --pure-red: #ff0000; --sky-blue: #1e90ff; --gray: #888888;
            --bg-main: #ffffff; --bg-preview: #fcfcfc; --bg-box: #ffffff;
            --text-main: #1a1a1a; --border-main: #000000; --toolbar-bg: #1a1a1a;
            --input-bg: #ffffff; --footer-bg: #1a1a1a; --guide-bg: #f5f5f5;
            --black: #1a1a1a; --light-gray: #e0e0e0;
        }

        body.dark-mode {
            --bg-main: #121212; --bg-preview: #1e1e1e; --bg-box: #2d2d2d;
            --text-main: #e0e0e0; --border-main: #555555; --toolbar-bg: #444444;
            --input-bg: #2d2d2d; --footer-bg: #1a1a1a; --guide-bg: #333333;
            --black: #e0e0e0; --light-gray: #444444;
        }

        body { font-family: "Helvetica Neue", Arial, sans-serif; margin: 0; background-color: var(--bg-main); color: var(--text-main); height: 100vh; overflow: hidden; transition: 0.3s; }
        .main-wrapper { display: flex; height: 100vh; width: 100%; }
        .editor-side { flex: 1; overflow-y: auto; padding: 40px 40px 120px 40px; border-right: 3px solid var(--border-main); box-sizing: border-box; }
        .preview-side { flex: 1; overflow-y: auto; padding: 40px; background-color: var(--bg-preview); box-sizing: border-box; }

        h1 { font-weight: 900; font-size: 2rem; margin: 0; border-bottom: 5px solid var(--pure-red); display: inline-block; }
        .sub-title { color: var(--pure-red); font-weight: 300; font-size: 1.3rem; margin: 10px 0 20px 0; display: block; }
        .header-controls { display: flex; align-items: center; gap: 10px; margin-top: 5px; }
        
        .btn-header { background: none; border: 1px solid var(--border-main); padding: 5px 10px; cursor: pointer; color: var(--text-main); font-weight: bold; font-size: 0.8rem; }
        .btn-login { background: var(--sky-blue); color: white; border: none; }
        .user-badge { display: none; align-items: center; gap: 8px; font-weight: bold; font-size: 0.85rem; }
        .logout-link { font-size: 0.7rem; color: var(--dull-red); cursor: pointer; text-decoration: underline; }

        .input-group, .section { background: var(--bg-box); padding: 25px; margin-bottom: 35px; border: 2px solid var(--border-main); border-radius: 0; position: relative; }
        .section-title { font-weight: 900; font-size: 1.2rem; color: var(--blue-green); border-left: 10px solid var(--black); padding-left: 10px; margin-bottom: 20px; display: block; }
        
        .field-unit { margin-bottom: 20px; }
        .field-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .field-header label { font-size: 0.8rem; font-weight: bold; }
        .char-count { font-size: 0.7rem; color: var(--gray); margin-left: 5px; }

        .textarea-container { border: 1px solid var(--border-main); overflow: hidden; }
        .toolbar { background: var(--toolbar-bg); padding: 5px; display: flex; gap: 5px; flex-wrap: wrap; }
        .btn-tool { background: var(--blue-green); color: white; border: none; padding: 3px 8px; cursor: pointer; font-size: 0.75rem; }
        textarea { width: 100%; padding: 12px; border: none; box-sizing: border-box; background: var(--input-bg); color: var(--text-main); font-family: inherit; font-size: 0.95rem; resize: none; overflow: hidden; display: block; }
        textarea:focus { outline: none; }

        .btn-field-reset { background: var(--light-gray); border: 1px solid var(--border-main); font-size: 0.7rem; padding: 2px 5px; cursor: pointer; }
        .btn-field-delete, .btn-section-delete {
            background: linear-gradient(to right, var(--dull-red) 50%, var(--light-gray) 50%);
            background-size: 200% 100%; background-position: right bottom;
            border: 1px solid var(--border-main); font-size: 0.7rem; padding: 2px 8px; cursor: pointer; font-weight: bold;
            transition: background-position 1s linear, color 1s linear;
        }
        .btn-field-delete.pressing, .btn-section-delete.pressing { background-position: left bottom; color: white; }

        .footer-bar { position: fixed; bottom: 0; left: 0; width: 50%; height: 65px; background: var(--footer-bg); display: flex; border-top: 3px solid var(--border-main); z-index: 1000; }
        .footer-bar button { flex: 1; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; color: white; }

        #preview h1 { border-bottom: 4px solid var(--black); padding-bottom: 5px; }
        #preview h2 { border-bottom: 2px solid var(--black); margin-top: 1.5em; }
        #preview blockquote { border-left: 6px solid var(--mustard); padding: 10px 15px; background: var(--guide-bg); margin: 15px 0; }
        #preview pre { background: #1e1e1e; color: #fff; padding: 15px; border-radius: 4px; overflow-x: auto; }
        #preview mark { background: #ffeb3b; padding: 0 2px; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: var(--bg-box); padding: 30px; border: 3px solid var(--border-main); width: 400px; box-shadow: 10px 10px 0 rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="editor-side">
        <span style="display: block; color: var(--pure-red); font-size: 0.8rem; font-weight: bold;">Markdownレポート爆速作成</span>
        <div style="display: flex; align-items: center; gap: 15px;">
            <h1>Mar君😎</h1>
            <div class="header-controls">
                <button class="btn-header" onclick="toggleTheme()">🌓 テーマ</button>
                <button id="loginBtn" class="btn-header btn-login" onclick="login()">Googleログイン</button>
                <div id="userArea" class="user-badge">
                    <span id="userName"></span>
                    <span class="logout-link" onclick="logout()">ログアウト</span>
                </div>
                <span id="syncStatus"></span>
            </div>
        </div>
        <span class="sub-title">レポートをmdに。手間をゼロに。</span>

        <div class="input-group">
            <div class="field-unit">
                <div class="field-header"><label>タイトル</label><button class="btn-field-reset" onclick="clearField('title')">リセット</button></div>
                <textarea id="title" placeholder="第1回 実験タイトル"></textarea>
            </div>
            <div class="field-unit">
                <div class="field-header"><label>名前 / 学籍番号</label><button class="btn-field-reset" onclick="clearField('name')">リセット</button></div>
                <textarea id="name" placeholder="山田太郎 2Ixx"></textarea>
            </div>
            <div class="field-unit">
                <div class="field-header"><label>目的</label><button class="btn-field-reset" onclick="clearField('purpose')">リセット</button></div>
                <div class="textarea-container">
                    <div class="toolbar">
                        <button class="btn-tool" onclick="addList('-', 'purpose')">・箇条書き</button>
                        <button class="btn-tool" onclick="insertWrap('**','**','purpose')">太字</button>
                        <button class="btn-tool" onclick="insertWrap('<mark>','</mark>','purpose')">蛍光ペン</button>
                    </div>
                    <textarea id="purpose" placeholder="本実験の目的は..."></textarea>
                </div>
            </div>
        </div>

        <div id="mainContainer"></div>

        <div style="text-align:center; padding: 20px; border: 2px dashed var(--blue-green); margin-bottom: 40px;">
            <button class="btn-header" style="background:var(--blue-green); color:white; border:none; padding:10px 20px;" onclick="addSection('experiment')">＋ 実験セクションを追加</button>
            <button class="btn-header" style="background:var(--blue-green); color:white; border:none; padding:10px 20px;" onclick="addSection('exercise')">＋ 演習セクションを追加</button>
        </div>

        <div class="input-group">
            <div class="field-unit">
                <div class="field-header"><label>感想・考察</label><span class="char-count" id="count_imp">0文字</span></div>
                <div class="textarea-container">
                    <div class="toolbar">
                        <button class="btn-tool" onclick="addList('-', 'impression')">・箇条書き</button>
                        <button class="btn-tool" onclick="insertWrap('**','**','impression')">太字</button>
                        <button class="btn-tool" onclick="insertWrap('<mark>','</mark>','impression')">蛍光ペン</button>
                    </div>
                    <textarea id="impression" placeholder="実験を通して学んだことなど..." style="min-height: 120px;"></textarea>
                </div>
            </div>
        </div>

        <h3>Markdown Output</h3>
        <textarea id="output" readonly style="height: 100px; background: var(--guide-bg); font-family: monospace; border: 1px solid var(--border-main);"></textarea>
    </div>

    <div class="preview-side">
        <div id="preview"></div>
    </div>
</div>

<div class="footer-bar">
    <button style="background: var(--mustard);" onclick="openReview()">レビューを送る</button>
    <button id="copyBtn" style="background: var(--sky-blue);" onclick="copyMD()">MDをコピー</button>
    <button style="background: var(--dull-red);" onclick="resetAll()">全データ消去</button>
</div>

<!-- モーダル -->
<div id="revModal" class="modal">
    <div class="modal-content">
        <h3>Mar君😎 へのレビュー</h3>
        <p style="font-size: 0.8rem; color: var(--gray);">このレビューは開発者にのみ直接送信されます！</p>
        <input type="text" id="revNick" placeholder="ニックネーム" style="width:100%; padding:10px; box-sizing:border-box; border:1px solid var(--border-main); margin-bottom:15px;">
        <textarea id="revText" placeholder="感想や改善案を教えてください！" style="height:100px; border:1px solid var(--border-main);"></textarea>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="sendReview()" style="flex:2; background:var(--sky-blue); color:white; border:none; padding:10px; cursor:pointer;">送信する</button>
            <button onclick="closeReview()" style="flex:1; background:var(--light-gray); border:none; cursor:pointer;">閉じる</button>
        </div>
    </div>
</div>

<script>
    let fieldIdCounter = 0;
    let saveDebounceTimer;
    let deleteTimer;

    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('marKunTheme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
    }

    function autoResize(ta) {
        if (ta.id === "output") return;
        ta.style.height = 'auto';
        ta.style.height = ta.scrollHeight + 'px';
    }

    function insertWrap(before, after, targetId) {
        const ta = document.getElementById(targetId);
        const start = ta.selectionStart;
        const end = ta.selectionEnd;
        const val = ta.value;
        ta.value = val.substring(0, start) + before + val.substring(start, end) + after + val.substring(end);
        ta.focus();
        updateAll();
    }

    function addList(prefix, targetId) {
        const ta = document.getElementById(targetId);
        const start = ta.selectionStart;
        const val = ta.value;
        const insert = (start === 0 || val[start-1] === '\n') ? prefix + " " : "\n" + prefix + " ";
        ta.value = val.substring(0, start) + insert + val.substring(start);
        ta.focus();
        updateAll();
    }

    function clearField(id) {
        document.getElementById(id).value = "";
        updateAll();
    }

    function addSection(type, savedData = null) {
        const container = document.getElementById('mainContainer');
        const secId = 'sec_' + (fieldIdCounter++);
        const div = document.createElement('div');
        div.className = 'section';
        div.dataset.type = type;
        
        const fields = savedData ? savedData.fields : [
            {label: '内容', value: ''},
            {label: 'コード', value: ''},
            {label: '結果', value: ''},
            {label: '考察', value: ''}
        ];

        let fieldsHtml = fields.map((f, i) => {
            const fid = `ta_${fieldIdCounter++}`;
            return `
                <div class="field-unit">
                    <div class="field-header"><label>${f.label}</label></div>
                    <div class="textarea-container">
                        <div class="toolbar">
                            <button class="btn-tool" onclick="insertWrap('**','**','${fid}')">太字</button>
                            <button class="btn-tool" onclick="insertWrap('\`','\`','${fid}')">コード</button>
                        </div>
                        <textarea id="${fid}" oninput="updateAll()" placeholder="${f.label}を入力...">${f.value}</textarea>
                    </div>
                </div>
            `;
        }).join('');

        div.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                <span class="section-title">${type === 'experiment' ? '実験' : '演習'}</span>
                <button class="btn-section-delete" onmousedown="startDel(this)" onmouseup="endDel(this)" onmouseleave="endDel(this)">長押し削除</button>
            </div>
            ${fieldsHtml}
        `;
        container.appendChild(div);
        div.querySelectorAll('textarea').forEach(autoResize);
        updateAll();
    }

    function startDel(btn) {
        btn.classList.add('pressing');
        deleteTimer = setTimeout(() => {
            btn.closest('.section').remove();
            updateAll();
        }, 1000);
    }
    function endDel(btn) {
        btn.classList.remove('pressing');
        clearTimeout(deleteTimer);
    }

    function updateAll() {
        const sections = document.querySelectorAll('.section');
        let counts = { experiment: 0, exercise: 0 };
        
        sections.forEach(s => {
            const t = s.dataset.type;
            counts[t]++;
            s.querySelector('.section-title').textContent = (t === 'experiment' ? '実験' : '演習') + " " + counts[t];
        });

        const v = (id) => document.getElementById(id).value;
        let md = `# ${v('title')}\n\n`;
        md += `**作成者:** ${v('name')}\n\n`;
        md += `## 目的\n> ${v('purpose')}\n\n`;

        sections.forEach(sec => {
            md += `## ${sec.querySelector('.section-title').textContent}\n\n`;
            sec.querySelectorAll('.field-unit').forEach(unit => {
                const label = unit.querySelector('label').textContent;
                const val = unit.querySelector('textarea').value;
                if (val) {
                    if (label === 'コード') md += `### ${label}\n\`\`\`\n${val}\n\`\`\`\n\n`;
                    else md += `### ${label}\n${val}\n\n`;
                }
            });
        });

        md += `## 感想・考察\n${v('impression')}\n`;
        
        document.getElementById('output').value = md;
        document.getElementById('count_imp').textContent = v('impression').length + "文字";
        
        renderPreview(md);

        // 自動保存処理（LocalStorage & Firebase）
        clearTimeout(saveDebounceTimer);
        saveDebounceTimer = setTimeout(saveData, 1000);
    }

    function renderPreview(md) {
        let html = md.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
            .replace(/\n/g, '<br>')
            .replace(/^# (.*)/gm, '<h1>$1</h1>')
            .replace(/^## (.*)/gm, '<h2>$1</h2>')
            .replace(/^### (.*)/gm, '<h3>$1</h3>')
            .replace(/^&gt; (.*)/gm, '<blockquote>$1</blockquote>')
            .replace(/&lt;mark&gt;(.*?)&lt;\/mark&gt;/g, '<mark>$1</mark>')
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/```<br>([\s\S]*?)<br>```/g, '<pre>$1</pre>');
        document.getElementById('preview').innerHTML = html;
        document.querySelectorAll('textarea').forEach(autoResize);
    }

    function saveData() {
        const data = {
            title: document.getElementById('title').value,
            name: document.getElementById('name').value,
            purpose: document.getElementById('purpose').value,
            impression: document.getElementById('impression').value,
            sections: Array.from(document.querySelectorAll('.section')).map(sec => ({
                type: sec.dataset.type,
                fields: Array.from(sec.querySelectorAll('.field-unit')).map(unit => ({
                    label: unit.querySelector('label').textContent,
                    value: unit.querySelector('textarea').value
                }))
            }))
        };
        localStorage.setItem('marKunData', JSON.stringify(data));
        if (window.triggerCloudSave) window.triggerCloudSave(data);
    }

    window.applyDataToUI = (data) => {
        document.getElementById('title').value = data.title || '';
        document.getElementById('name').value = data.name || '';
        document.getElementById('purpose').value = data.purpose || '';
        document.getElementById('impression').value = data.impression || '';
        document.getElementById('mainContainer').innerHTML = '';
        if (data.sections) data.sections.forEach(s => addSection(s.type, s));
        updateAll();
    };

    function loadFromLocal() {
        const saved = localStorage.getItem('marKunData');
        if (saved) window.applyDataToUI(JSON.parse(saved));
    }

    function copyMD() {
        const out = document.getElementById('output');
        out.select();
        document.execCommand('copy');
        document.getElementById('copyBtn').textContent = '✅ コピー完了';
        setTimeout(() => document.getElementById('copyBtn').textContent = 'MDをコピー', 2000);
    }

    function resetAll() {
        if (confirm("全てのデータを消去しますか？クラウド上のデータも削除されます。")) {
            localStorage.removeItem('marKunData');
            location.reload();
        }
    }

    function openReview() { document.getElementById('revModal').style.display = 'flex'; }
    function closeReview() { document.getElementById('revModal').style.display = 'none'; }
    function sendReview() {
        const nick = document.getElementById('revNick').value || "名無し";
        const text = document.getElementById('revText').value;
        if (!text) return alert("内容を入力してください");
        fetch("https://script.google.com/macros/s/AKfycbxtN3kEjLorW2irIgjZML7zEmpDSuVrVz_U2fwGSzLaknT87qWABd9Bo9WZecV2TGo/exec", {
            method: 'POST',
            body: new URLSearchParams({nickname: nick, review: text})
        }).then(() => { alert("送信しました！"); closeReview(); });
    }

    document.addEventListener('DOMContentLoaded', () => {
        if (localStorage.getItem('marKunTheme') === 'dark') toggleTheme();
        document.querySelectorAll('textarea').forEach(autoResize);
    });
</script>

</body>
</html>
