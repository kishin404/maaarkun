<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mar君😎 - Markdownレポート作成ツール</title>
    <link rel="icon" href="IMG_8917.ico" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    
    <!-- Firebase SDK (ES Modules) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase設定
        const firebaseConfig = {
            apiKey: "AIzaSyDysubyBTK7o2JvoOY-PAB8JlAY8-QZfD4",
            authDomain: "mar-kun-app.firebaseapp.com",
            projectId: "mar-kun-app",
            storageBucket: "mar-kun-app.firebasestorage.app",
            messagingSenderId: "392787998936",
            appId: "1:392787998936:web:a0c01b3b7089e1388d3fad"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let isInitialLoad = true;

        // ログイン処理
        window.login = () => {
            signInWithPopup(auth, provider).catch(err => alert("ログイン失敗: " + err.message));
        };

        // ログアウト処理
        window.logout = () => {
            if (confirm("ログアウトしますか？現在の編集内容はクラウドに保存されています。")) {
                signOut(auth).then(() => {
                    localStorage.removeItem('marKunData');
                    location.reload();
                });
            }
        };

        // ログイン状態監視
        onAuthStateChanged(auth, async (user) => {
            const loginBtn = document.getElementById('loginBtn');
            const userArea = document.getElementById('userArea');
            const syncStatus = document.getElementById('syncStatus');

            if (user) {
                currentUser = user;
                loginBtn.style.display = 'none';
                userArea.style.display = 'inline-flex';
                document.getElementById('userName').textContent = user.displayName + " さん";
                
                syncStatus.textContent = "⏳ 同期中...";
                await loadDataFromFirestore(user.uid);
                syncStatus.textContent = "✅ クラウド同期済み";
            } else {
                currentUser = null;
                loginBtn.style.display = 'inline-block';
                userArea.style.display = 'none';
                syncStatus.textContent = "🌐 ローカル保存モード";
                if (isInitialLoad) loadDataFromLocal();
            }
            isInitialLoad = false;
        });

        // クラウド保存処理
        window.saveToFirestore = async (data) => {
            if (!currentUser) return;
            const syncStatus = document.getElementById('syncStatus');
            try {
                await setDoc(doc(db, "users", currentUser.uid), {
                    reportData: JSON.stringify(data),
                    updatedAt: new Date()
                });
                syncStatus.textContent = "✅ 保存完了";
            } catch (e) {
                console.error(e);
                syncStatus.textContent = "❌ 保存失敗";
            }
        };

        // クラウド読み込み
        async function loadDataFromFirestore(uid) {
            try {
                const docRef = doc(db, "users", uid);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    const data = JSON.parse(docSnap.data().reportData);
                    window.applyDataToUI(data);
                }
            } catch (e) {
                console.error("読み込みエラー:", e);
            }
        }
    </script>

    <style>
        :root {
            --mustard: #e1ad01; --blue-green: #009688; --dull-red: #b85450;
            --pure-red: #ff0000; --sky-blue: #1e90ff; --gray: #888888;
            --bg-main: #ffffff; --bg-preview: #fcfcfc; --bg-box: #ffffff;
            --text-main: #1a1a1a; --border-main: #000000; --toolbar-bg: #1a1a1a;
            --input-bg: #ffffff; --footer-bg: #1a1a1a; --guide-bg: #f5f5f5;
        }

        body.dark-mode {
            --bg-main: #121212; --bg-preview: #1e1e1e; --bg-box: #2d2d2d;
            --text-main: #e0e0e0; --border-main: #555555; --toolbar-bg: #444444;
            --input-bg: #2d2d2d; --footer-bg: #111111; --guide-bg: #333333;
        }

        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            margin: 0; background-color: var(--bg-main); color: var(--text-main);
            height: 100vh; overflow: hidden; transition: 0.3s;
        }

        .main-wrapper { display: flex; height: 100vh; width: 100%; }
        .editor-side {
            flex: 1; overflow-y: auto; padding: 40px 40px 120px 40px;
            border-right: 3px solid var(--border-main); box-sizing: border-box;
        }
        .preview-side { flex: 1; overflow-y: auto; padding: 40px; background-color: var(--bg-preview); box-sizing: border-box; }

        h1 { font-weight: 900; font-size: 2rem; margin: 0; border-bottom: 5px solid var(--pure-red); display: inline-block; }
        .sub-title { color: var(--pure-red); font-size: 1.2rem; margin: 10px 0 20px 0; display: block; }

        .header-controls { display: flex; align-items: center; gap: 15px; margin-top: 10px; }
        .btn-header { background: none; border: 1px solid var(--border-main); padding: 5px 12px; cursor: pointer; color: var(--text-main); font-weight: bold; font-size: 0.8rem; }
        .btn-login { background: var(--sky-blue); color: white; border: none; }
        .user-badge { display: none; align-items: center; gap: 10px; font-size: 0.85rem; }
        .logout-link { color: var(--dull-red); cursor: pointer; text-decoration: underline; font-size: 0.75rem; }
        #syncStatus { font-size: 0.75rem; color: var(--gray); }

        .input-group, .section { background: var(--bg-box); padding: 25px; margin-bottom: 30px; border: 2px solid var(--border-main); }
        .field-unit { margin-bottom: 15px; }
        .field-unit label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; }
        
        textarea {
            width: 100%; padding: 12px; border: 1px solid var(--border-main); box-sizing: border-box;
            background: var(--input-bg); color: var(--text-main); font-family: inherit; resize: none;
        }
        .toolbar { background: var(--toolbar-bg); padding: 5px; display: flex; gap: 5px; border: 1px solid var(--border-main); border-bottom: none; }
        .btn-tool { background: var(--blue-green); color: white; border: none; padding: 3px 8px; cursor: pointer; font-size: 0.75rem; }

        .section-title { font-weight: 900; font-size: 1.1rem; color: var(--blue-green); border-left: 8px solid var(--text-main); padding-left: 10px; margin-bottom: 15px; display: block; }
        .btn-delete { color: var(--dull-red); border: 1px solid var(--dull-red); background: none; cursor: pointer; font-size: 0.7rem; padding: 2px 5px; margin-top: 10px; }

        #preview h1 { border-bottom: 3px solid var(--border-main); padding-bottom: 5px; }
        #preview blockquote { border-left: 5px solid var(--mustard); padding: 10px; background: var(--guide-bg); margin: 10px 0; }
        #preview pre { background: #1e1e1e; color: #fff; padding: 15px; overflow-x: auto; }

        .footer-bar {
            position: fixed; bottom: 0; left: 0; width: 50%; height: 60px;
            background: var(--footer-bg); display: flex; border-top: 3px solid var(--border-main);
        }
        .footer-bar button { flex: 1; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 0.9rem; }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content { background: var(--bg-box); padding: 30px; border: 3px solid var(--border-main); width: 400px; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="editor-side">
        <h1>Mar君😎</h1>
        <div class="header-controls">
            <button class="btn-header" onclick="toggleTheme()">🌓 テーマ切替</button>
            <button id="loginBtn" class="btn-header btn-login" onclick="login()">Googleログイン</button>
            <div id="userArea" class="user-badge">
                <span id="userName"></span>
                <span class="logout-link" onclick="logout()">ログアウト</span>
            </div>
            <span id="syncStatus"></span>
        </div>
        <span class="sub-title">レポート作成を、もっと自由に、爆速に。</span>

        <div class="input-group">
            <div class="field-unit">
                <label>タイトル</label>
                <textarea id="title" placeholder="実験タイトル"></textarea>
            </div>
            <div class="field-unit">
                <label>名前 / 学籍番号</label>
                <textarea id="name" placeholder="山田太郎 2Ixx"></textarea>
            </div>
            <div class="field-unit">
                <label>目的</label>
                <textarea id="purpose" placeholder="本実験の目的は..."></textarea>
            </div>
        </div>

        <div id="mainContainer"></div>
        <div style="text-align:center; margin-bottom: 40px;">
            <button class="btn-header" style="background:var(--blue-green); color:white; border:none;" onclick="addSection('experiment')">＋ 実験セクションを追加</button>
            <button class="btn-header" style="background:var(--blue-green); color:white; border:none;" onclick="addSection('exercise')">＋ 演習セクションを追加</button>
        </div>

        <div class="input-group">
            <div class="field-unit">
                <label>全体の感想・考察</label>
                <textarea id="impression" style="min-height: 100px;"></textarea>
            </div>
        </div>

        <h3>Markdown 出力</h3>
        <textarea id="output" readonly style="height: 100px; background: #eee; color: #333;"></textarea>
    </div>

    <div class="preview-side">
        <div id="preview"></div>
    </div>
</div>

<div class="footer-bar">
    <button style="background: var(--mustard);" onclick="openModal()">レビューを書く</button>
    <button id="copyBtn" style="background: var(--sky-blue);" onclick="copyMD()">MDをコピー</button>
    <button style="background: var(--dull-red);" onclick="resetAll()">全リセット</button>
</div>

<!-- レビューモーダル -->
<div id="reviewModal" class="modal">
    <div class="modal-content">
        <h3>Mar君😎 へのレビュー</h3>
        <p style="font-size: 0.8rem; color: var(--gray);">このレビューは開発者にのみ直接送信されます！</p>
        <input type="text" id="revNick" placeholder="ニックネーム" style="width:100%; margin-bottom:10px; padding:8px; border:1px solid var(--border-main);">
        <textarea id="revText" placeholder="メッセージを入力..." style="height:100px;"></textarea>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button onclick="sendReview()" style="flex:2; background:var(--sky-blue); color:white; border:none; padding:10px; cursor:pointer;">送信する</button>
            <button onclick="closeModal()" style="flex:1; background:#ccc; border:none; cursor:pointer;">閉じる</button>
        </div>
    </div>
</div>

<script>
    let fieldIdCounter = 0;
    let saveTimer;

    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('marKunTheme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
    }

    function addSection(type, data = null) {
        const container = document.getElementById('mainContainer');
        const id = 'sec_' + (fieldIdCounter++);
        const div = document.createElement('div');
        div.className = 'section';
        div.dataset.type = type;
        
        const fields = data ? data.fields : [
            {label: '内容', value: ''},
            {label: 'コード', value: ''},
            {label: '結果', value: ''}
        ];

        let fieldsHtml = fields.map((f, i) => `
            <div class="field-unit" data-label="${f.label}">
                <label>${f.label}</label>
                <textarea oninput="updateAll()">${f.value}</textarea>
            </div>
        `).join('');

        div.innerHTML = `
            <span class="section-title">${type === 'experiment' ? '実験' : '演習'}</span>
            ${fieldsHtml}
            <button class="btn-delete" onclick="this.parentElement.remove(); updateAll();">セクション削除</button>
        `;
        container.appendChild(div);
        updateAll();
    }

    function updateAll() {
        const sections = document.querySelectorAll('.section');
        let md = `# ${document.getElementById('title').value}\n\n`;
        md += `**${document.getElementById('name').value}**\n\n`;
        md += `## 目的\n> ${document.getElementById('purpose').value}\n\n`;

        sections.forEach((sec, idx) => {
            const typeLabel = sec.dataset.type === 'experiment' ? '実験' : '演習';
            md += `## ${typeLabel} ${idx + 1}\n\n`;
            sec.querySelectorAll('.field-unit').forEach(unit => {
                const label = unit.dataset.label;
                const val = unit.querySelector('textarea').value;
                if (val) {
                    md += `### ${label}\n${label === 'コード' ? '
